name: GHCR Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - "docker-compose.yml"
      - ".github/workflows/ghcr-docker.yml"

concurrency:
  group: ghcr-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      MAGIC_COMPARE_HIDE_DEMO: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Docker data directories
        run: |
          mkdir -p docker-data/rustfs docker-data/internal-data/sqlite
          chmod -R 0777 docker-data

      - name: Start compose stack
        run: docker compose up -d --build rustfs rustfs-init internal-site

      - name: Wait for internal-site
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..90}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for internal-site to become ready."
          docker compose ps
          docker compose logs rustfs rustfs-init internal-site
          exit 1

      - name: Print compose logs on failure
        if: failure()
        run: docker compose logs rustfs rustfs-init internal-site

      - name: Stop compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  publish:
    needs: smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/magic-compare-web
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=magic-compare-web
            org.opencontainers.image.description=Magic Compare internal-site runtime image

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/internal-site.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
