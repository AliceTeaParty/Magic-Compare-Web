name: GHCR Docker

run-name: GHCR Docker • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - "docker-compose.yml"
      - ".github/workflows/ghcr-docker.yml"

concurrency:
  group: ghcr-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CI_COMPOSE_ARGS: -f docker-compose.yml -f docker/ci.compose.override.yml
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/magic-compare-web

jobs:
  smoke:
    name: Smoke Test Runtime Image Path
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Rustfs (minio-compatible) is wired in via ci.compose.override.yml as a CI-only sidecar.
      # FORCE_PATH_STYLE is required for minio; production R2 uses false instead.
      MAGIC_COMPARE_S3_BUCKET: magic-compare-ci
      MAGIC_COMPARE_S3_REGION: us-east-1
      MAGIC_COMPARE_S3_ENDPOINT: http://rustfs:9000
      MAGIC_COMPARE_S3_PUBLIC_BASE_URL: http://127.0.0.1:9000/magic-compare-ci
      MAGIC_COMPARE_S3_ACCESS_KEY_ID: rustfsadmin
      MAGIC_COMPARE_S3_SECRET_ACCESS_KEY: rustfsadmin
      MAGIC_COMPARE_S3_FORCE_PATH_STYLE: "true"
      MAGIC_COMPARE_S3_INTERNAL_PREFIX: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start compose stack
        run: docker compose $CI_COMPOSE_ARGS up -d --build internal-site rustfs

      - name: Wait for runtime readiness
        run: |
          set -euo pipefail
          for _ in {1..120}; do
            internal_site_init_container_id="$(docker compose $CI_COMPOSE_ARGS ps -a -q internal-site-init)"
            if [[ -n "$internal_site_init_container_id" ]]; then
              internal_site_init_status="$(docker inspect -f '{{.State.Status}}' "$internal_site_init_container_id")"
              if [[ "$internal_site_init_status" == "exited" ]]; then
                internal_site_init_exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$internal_site_init_container_id")"
                if [[ "$internal_site_init_exit_code" != "0" ]]; then
                  echo "internal-site-init exited with code $internal_site_init_exit_code."
                  docker compose $CI_COMPOSE_ARGS ps
                  docker compose $CI_COMPOSE_ARGS logs rustfs rustfs-init internal-site-init internal-site
                  exit 1
                fi
              fi
            fi

            internal_site_container_id="$(docker compose $CI_COMPOSE_ARGS ps -a -q internal-site)"
            if [[ -n "$internal_site_container_id" ]]; then
              internal_site_status="$(docker inspect -f '{{.State.Status}}' "$internal_site_container_id")"
              if [[ "$internal_site_status" == "exited" || "$internal_site_status" == "dead" ]]; then
                internal_site_exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$internal_site_container_id")"
                echo "internal-site exited with code $internal_site_exit_code before readiness."
                docker compose $CI_COMPOSE_ARGS ps
                docker compose $CI_COMPOSE_ARGS logs rustfs rustfs-init internal-site-init internal-site
                exit 1
              fi
            fi

            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for internal-site to become ready."
          docker compose $CI_COMPOSE_ARGS ps
          docker compose $CI_COMPOSE_ARGS logs rustfs rustfs-init internal-site-init internal-site
          exit 1

      - name: Verify demo seed ran
        run: |
          set -euo pipefail
          # Demo seed writes a manifest to object storage and metadata to SQLite.
          # Verify internal-site can serve the demo case page as a proxy for seed success.
          if ! curl -fsS "http://127.0.0.1:3000/cases/demo-grain-study" >/dev/null; then
            echo "Demo case page not accessible — seed may have failed."
            docker compose $CI_COMPOSE_ARGS logs internal-site-init internal-site
            exit 1
          fi

      - name: Capture compose logs
        if: always()
        run: |
          {
            docker compose $CI_COMPOSE_ARGS ps || true
            echo
            docker compose $CI_COMPOSE_ARGS logs rustfs rustfs-init internal-site-init internal-site || true
          } > ghcr-smoke.compose.log

      - name: Write smoke summary
        if: always()
        run: |
          {
            echo "## GHCR Smoke Summary"
            echo
            echo "- Compose files: \`docker-compose.yml\` + \`docker/ci.compose.override.yml\`"
            echo "- Runtime image target: \`${IMAGE_NAME}\`"
            echo "- Object storage: rustfs (minio-compatible) CI sidecar on port 9000"
            echo "- Readiness probe: \`http://127.0.0.1:3000\`"
            echo "- Demo seed: enabled (S3 configured via CI env)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghcr-smoke-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ghcr-smoke.compose.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop compose stack
        if: always()
        run: docker compose $CI_COMPOSE_ARGS down --volumes --remove-orphans

  publish:
    name: Publish GHCR Image
    needs: smoke
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=magic-compare-web
            org.opencontainers.image.description=Magic Compare internal-site runtime image

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/internal-site.Dockerfile
          push: true
          pull: true
          platforms: linux/amd64
          cache-from: type=gha,scope=ghcr-docker
          cache-to: type=gha,mode=max,scope=ghcr-docker
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write publish summary
        run: |
          {
            echo "## GHCR Publish Summary"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [[ -n "$tag" ]] && echo "  - \`$tag\`"
            done <<< "${{ steps.meta.outputs.tags }}"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
