name: Uploader Binaries

run-name: Uploader Binaries • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            platform: linux
            arch: amd64
            bundle-name: magic-compare-uploader-linux-amd64
            binary-path: tools/uploader/dist/magic-compare-uploader-linux-amd64/magic-compare-uploader-linux-amd64
            archive-path: tools/uploader/dist/magic-compare-uploader-linux-amd64.zip
            pykakasi-data-path: tools/uploader/dist/magic-compare-uploader-linux-amd64/_internal/pykakasi/data/kanwadict4.db
          - os: windows-latest
            python-version: "3.12"
            platform: windows
            arch: amd64
            bundle-name: magic-compare-uploader-windows-amd64
            binary-path: tools/uploader/dist/magic-compare-uploader-windows-amd64/magic-compare-uploader-windows-amd64.exe
            archive-path: tools/uploader/dist/magic-compare-uploader-windows-amd64.zip
            pykakasi-data-path: tools/uploader/dist/magic-compare-uploader-windows-amd64/_internal/pykakasi/data/kanwadict4.db
          - os: macos-14
            python-version: "3.12"
            platform: macos
            arch: arm64
            bundle-name: magic-compare-uploader-macos-arm64
            binary-path: tools/uploader/dist/magic-compare-uploader-macos-arm64/magic-compare-uploader-macos-arm64
            archive-path: tools/uploader/dist/magic-compare-uploader-macos-arm64.zip
            pykakasi-data-path: tools/uploader/dist/magic-compare-uploader-macos-arm64/_internal/pykakasi/data/kanwadict4.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tools/uploader/pyproject.toml

      - name: Install uploader build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./tools/uploader[build]"

      - name: Build uploader binary
        run: |
          cd tools/uploader
          python scripts/build-binary.py --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --layout onedir --archive zip

      - name: Verify binary help output
        run: ${{ matrix.binary-path }} --help >/dev/null

      - name: Verify packaged pykakasi data files
        run: test -f "${{ matrix.pykakasi-data-path }}"

      - name: Smoke plan on sample flat source with kana slug
        run: |
          sample_root="$(mktemp -d)"
          sample_dir="$sample_root/マジカル比較"
          mkdir -p "$sample_dir"
          python - "$sample_dir" <<'PY'
          from pathlib import Path
          import sys
          from PIL import Image

          root = Path(sys.argv[1])
          Image.new("RGB", (32, 24), color=(0, 0, 0)).save(root / "24_demo_00001_100_src.png")
          Image.new("RGB", (32, 24), color=(255, 255, 255)).save(root / "24_demo_00001_100_output.png")
          PY
          ${{ matrix.binary-path }} plan "$sample_dir" >/dev/null

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle-name }}-zip
          path: ${{ matrix.archive-path }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release with uploader archives
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
