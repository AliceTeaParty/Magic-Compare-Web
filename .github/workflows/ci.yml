name: CI

run-name: CI • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/**"
      - "packages/**"
      - "tools/uploader/**"
      - "docs/uploader/**"
      - "scripts/**"
      - "docker/**"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "tools/uploader/**"
      - "docs/uploader/**"
      - "scripts/**"
      - "docker/**"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.32.1"
  PYTHON_VERSION: "3.12"
  CI_COMPOSE_ARGS: -f docker-compose.yml -f docker/ci.compose.override.yml

jobs:
  verify-uploader:
    name: Verify Uploader
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: tools/uploader/pyproject.toml

      - name: Install uploader dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./tools/uploader

      - name: Run uploader unit tests
        run: cd tools/uploader && python -m unittest discover -s tests

  verify:
    name: Verify Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  compose-smoke:
    name: Verify Compose Internal Site
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MAGIC_COMPARE_HIDE_DEMO: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start compose stack
        run: docker compose $CI_COMPOSE_ARGS up -d --build internal-site

      - name: Wait for internal-site readiness
        run: |
          set -euo pipefail
          for _ in {1..90}; do
            internal_site_init_container_id="$(docker compose $CI_COMPOSE_ARGS ps -a -q internal-site-init)"
            if [[ -n "$internal_site_init_container_id" ]]; then
              internal_site_init_status="$(docker inspect -f '{{.State.Status}}' "$internal_site_init_container_id")"
              if [[ "$internal_site_init_status" == "exited" ]]; then
                internal_site_init_exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$internal_site_init_container_id")"
                if [[ "$internal_site_init_exit_code" != "0" ]]; then
                  echo "internal-site-init exited with code $internal_site_init_exit_code."
                  docker compose $CI_COMPOSE_ARGS ps
                  docker compose $CI_COMPOSE_ARGS logs internal-site-init internal-site
                  exit 1
                fi
              fi
            fi

            internal_site_container_id="$(docker compose $CI_COMPOSE_ARGS ps -a -q internal-site)"
            if [[ -n "$internal_site_container_id" ]]; then
              internal_site_status="$(docker inspect -f '{{.State.Status}}' "$internal_site_container_id")"
              if [[ "$internal_site_status" == "exited" || "$internal_site_status" == "dead" ]]; then
                internal_site_exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$internal_site_container_id")"
                echo "internal-site exited with code $internal_site_exit_code before readiness."
                docker compose $CI_COMPOSE_ARGS ps
                docker compose $CI_COMPOSE_ARGS logs internal-site-init internal-site
                exit 1
              fi
            fi

            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for internal-site to become ready."
          docker compose $CI_COMPOSE_ARGS ps
          docker compose $CI_COMPOSE_ARGS logs internal-site-init internal-site
          exit 1

      - name: Capture compose logs
        if: always()
        run: |
          {
            docker compose $CI_COMPOSE_ARGS ps || true
            echo
            docker compose $CI_COMPOSE_ARGS logs internal-site-init internal-site || true
          } > ci-compose-smoke.log

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## CI Compose Smoke Summary"
            echo
            echo "- Compose files: \`docker-compose.yml\` + \`docker/ci.compose.override.yml\`"
            echo "- Readiness probe: \`http://127.0.0.1:3000\`"
            echo "- Demo seed: skipped in CI smoke unless external S3/R2 env is provided"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-compose-smoke-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-compose-smoke.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop compose stack
        if: always()
        run: docker compose $CI_COMPOSE_ARGS down --volumes --remove-orphans
