x-internal-site-common: &internal-site-common
  image: ${MAGIC_COMPARE_INTERNAL_SITE_IMAGE:-ghcr.io/aliceteaparty/magic-compare-web:main}
  environment: &internal-site-environment
    DATABASE_URL: ${MAGIC_COMPARE_DOCKER_DATABASE_URL:-file:/app/data/sqlite/internal-site.db}
    MAGIC_COMPARE_HIDE_DEMO: ${MAGIC_COMPARE_HIDE_DEMO:-true}
    MAGIC_COMPARE_PUBLISHED_ROOT: ${MAGIC_COMPARE_PUBLISHED_ROOT:-/app/data/published}
    MAGIC_COMPARE_PUBLIC_EXPORT_DIR: ${MAGIC_COMPARE_PUBLIC_EXPORT_DIR:-/app/data/public-export}
    MAGIC_COMPARE_PUBLIC_SITE_BASE_URL: ${MAGIC_COMPARE_PUBLIC_SITE_BASE_URL:-}
    MAGIC_COMPARE_S3_BUCKET: ${MAGIC_COMPARE_S3_BUCKET:-}
    MAGIC_COMPARE_S3_REGION: ${MAGIC_COMPARE_S3_REGION:-auto}
    MAGIC_COMPARE_S3_ENDPOINT: ${MAGIC_COMPARE_S3_ENDPOINT:-}
    MAGIC_COMPARE_S3_PUBLIC_BASE_URL: ${MAGIC_COMPARE_S3_PUBLIC_BASE_URL:-}
    MAGIC_COMPARE_S3_ACCESS_KEY_ID: ${MAGIC_COMPARE_S3_ACCESS_KEY_ID:-}
    MAGIC_COMPARE_S3_SECRET_ACCESS_KEY: ${MAGIC_COMPARE_S3_SECRET_ACCESS_KEY:-}
    MAGIC_COMPARE_S3_FORCE_PATH_STYLE: ${MAGIC_COMPARE_S3_FORCE_PATH_STYLE:-false}
    MAGIC_COMPARE_S3_INTERNAL_PREFIX: ${MAGIC_COMPARE_S3_INTERNAL_PREFIX:-}
    MAGIC_COMPARE_FOOTER_YEAR_START: ${MAGIC_COMPARE_FOOTER_YEAR_START:-2026}
    MAGIC_COMPARE_FOOTER_AUTHOR: ${MAGIC_COMPARE_FOOTER_AUTHOR:-Magic Compare}
    MAGIC_COMPARE_FOOTER_JOIN_US_LABEL: ${MAGIC_COMPARE_FOOTER_JOIN_US_LABEL:-}
    MAGIC_COMPARE_FOOTER_JOIN_US_URL: ${MAGIC_COMPARE_FOOTER_JOIN_US_URL:-}
    MAGIC_COMPARE_CF_PAGES_PROJECT_NAME: ${MAGIC_COMPARE_CF_PAGES_PROJECT_NAME:-}
    MAGIC_COMPARE_CF_PAGES_BRANCH: ${MAGIC_COMPARE_CF_PAGES_BRANCH:-}
    CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
    CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
  volumes:
    - ${MAGIC_COMPARE_INTERNAL_DATA_MOUNT:-internal-data}:/app/data

services:
  internal-site-init:
    <<: *internal-site-common
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Running internal-site schema sync..."
        pnpm db:push

        if [ "${MAGIC_COMPARE_HIDE_DEMO:-true}" != "true" ] &&
          [ -n "${MAGIC_COMPARE_S3_BUCKET:-}" ] &&
          [ -n "${MAGIC_COMPARE_S3_PUBLIC_BASE_URL:-}" ] &&
          [ -n "${MAGIC_COMPARE_S3_ACCESS_KEY_ID:-}" ] &&
          [ -n "${MAGIC_COMPARE_S3_SECRET_ACCESS_KEY:-}" ]; then
          echo "Running internal-site demo seed..."
          pnpm db:seed
        else
          echo "Skipping demo seed because demo is hidden or external storage is not configured."
        fi

        echo "internal-site init complete."
    restart: "no"

  internal-site:
    <<: *internal-site-common
    container_name: magic-compare-internal-site
    restart: unless-stopped
    depends_on:
      internal-site-init:
        condition: service_completed_successfully
    ports:
      - "${MAGIC_COMPARE_INTERNAL_SITE_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 45s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  internal-data:
