x-internal-site-common: &internal-site-common
  image: ${MAGIC_COMPARE_INTERNAL_SITE_IMAGE:-ghcr.io/aliceteaparty/magic-compare-web:main}
  environment: &internal-site-environment
    DATABASE_URL: ${MAGIC_COMPARE_DOCKER_DATABASE_URL:-file:/app/data/sqlite/internal-site.db}
    MAGIC_COMPARE_HIDE_DEMO: ${MAGIC_COMPARE_HIDE_DEMO:-true}
    MAGIC_COMPARE_PUBLISHED_ROOT: ${MAGIC_COMPARE_PUBLISHED_ROOT:-/app/data/published}
    MAGIC_COMPARE_PUBLIC_EXPORT_DIR: ${MAGIC_COMPARE_PUBLIC_EXPORT_DIR:-/app/data/public-export}
    MAGIC_COMPARE_S3_BUCKET: ${MAGIC_COMPARE_S3_BUCKET:-magic-compare-assets}
    MAGIC_COMPARE_S3_REGION: ${MAGIC_COMPARE_S3_REGION:-us-east-1}
    MAGIC_COMPARE_S3_ENDPOINT: ${MAGIC_COMPARE_DOCKER_S3_ENDPOINT:-http://rustfs:9000}
    MAGIC_COMPARE_S3_PUBLIC_BASE_URL: ${MAGIC_COMPARE_S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000/magic-compare-assets}
    MAGIC_COMPARE_S3_ACCESS_KEY_ID: ${MAGIC_COMPARE_S3_ACCESS_KEY_ID:-rustfsadmin}
    MAGIC_COMPARE_S3_SECRET_ACCESS_KEY: ${MAGIC_COMPARE_S3_SECRET_ACCESS_KEY:-rustfsadmin}
    MAGIC_COMPARE_S3_FORCE_PATH_STYLE: ${MAGIC_COMPARE_S3_FORCE_PATH_STYLE:-true}
    MAGIC_COMPARE_S3_INTERNAL_PREFIX: ${MAGIC_COMPARE_S3_INTERNAL_PREFIX:-internal-assets}
    MAGIC_COMPARE_CF_PAGES_PROJECT_NAME: ${MAGIC_COMPARE_CF_PAGES_PROJECT_NAME:-}
    MAGIC_COMPARE_CF_PAGES_BRANCH: ${MAGIC_COMPARE_CF_PAGES_BRANCH:-}
    CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
    CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
  volumes:
    - internal-data:/app/data

services:
  rustfs:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: magic-compare-rustfs
    init: true
    restart: unless-stopped
    ports:
      - "${MAGIC_COMPARE_RUSTFS_S3_PORT:-9000}:9000"
#      - "${MAGIC_COMPARE_RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MAGIC_COMPARE_S3_ACCESS_KEY_ID:-rustfsadmin}
      MINIO_ROOT_PASSWORD: ${MAGIC_COMPARE_S3_SECRET_ACCESS_KEY:-rustfsadmin}
      MALLOC_ARENA_MAX: ${MAGIC_COMPARE_RUSTFS_MALLOC_ARENA_MAX:-2}
    command:
      [
        "server",
        "/data",
        "--address",
        "${MAGIC_COMPARE_RUSTFS_ADDRESS:-:9000}",
        "--console-address",
        "${MAGIC_COMPARE_RUSTFS_CONSOLE_ADDRESS:-:9001}",
      ]
    mem_limit: ${MAGIC_COMPARE_RUSTFS_MEM_LIMIT:-512m}
    cpus: ${MAGIC_COMPARE_RUSTFS_CPUS:-1.0}
    tmpfs:
      - /tmp:size=${MAGIC_COMPARE_RUSTFS_TMPFS_SIZE:-64m}
    logging:
      driver: json-file
      options:
        max-size: ${MAGIC_COMPARE_RUSTFS_LOG_MAX_SIZE:-10m}
        max-file: "${MAGIC_COMPARE_RUSTFS_LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - rustfs-data:/data

  rustfs-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    entrypoint:
      - /bin/sh
      - /opt/magic-compare/rustfs-init.sh
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    environment:
      MAGIC_COMPARE_DOCKER_S3_ENDPOINT: ${MAGIC_COMPARE_DOCKER_S3_ENDPOINT:-http://rustfs:9000}
      MAGIC_COMPARE_S3_ACCESS_KEY_ID: ${MAGIC_COMPARE_S3_ACCESS_KEY_ID:-rustfsadmin}
      MAGIC_COMPARE_S3_SECRET_ACCESS_KEY: ${MAGIC_COMPARE_S3_SECRET_ACCESS_KEY:-rustfsadmin}
      MAGIC_COMPARE_S3_BUCKET: ${MAGIC_COMPARE_S3_BUCKET:-magic-compare-assets}
    volumes:
      - ./docker/rustfs-init.sh:/opt/magic-compare/rustfs-init.sh:ro

  internal-site-init:
    <<: *internal-site-common
    entrypoint:
      - /bin/sh
      - /opt/magic-compare/internal-site-init.sh
    depends_on:
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - internal-data:/app/data
      - ./docker/internal-site-init.sh:/opt/magic-compare/internal-site-init.sh:ro

  internal-site:
    <<: *internal-site-common
    container_name: magic-compare-internal-site
    restart: unless-stopped
    depends_on:
      rustfs:
        condition: service_healthy
      internal-site-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 45s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  rustfs-data:
  internal-data:
