services:
  rustfs:
    volumes:
      - rustfs-data:/data

  rustfs-init:
    command:
      - |
        set -euo pipefail
        export AWS_PAGER=""
        until aws --no-cli-pager --endpoint-url http://rustfs:9000 s3api list-buckets >/dev/null 2>&1; do
          sleep 2
        done
        if ! aws --no-cli-pager --endpoint-url http://rustfs:9000 s3api head-bucket --bucket "$$MAGIC_COMPARE_S3_BUCKET" >/dev/null 2>&1; then
          aws --no-cli-pager --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$$MAGIC_COMPARE_S3_BUCKET"
        fi

  internal-site:
    volumes:
      - internal-data:/app/data

volumes:
  rustfs-data:
  internal-data:
